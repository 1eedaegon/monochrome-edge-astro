name: Dependabot auto-merge

# Merges Dependabot PRs after CI succeeds — without branch protection, so
# direct pushes to main (the publish flow) stay unrestricted.
#
# Policy:
#  - minor/patch bumps: squash-merge automatically, then dispatch deploy
#    (a GITHUB_TOKEN merge does not trigger the push-based deploy workflow)
#  - major bumps: left open for human review (breaking-change risk)
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  # Daily safety net: a workflow_run event can be missed (e.g. CI was red at the
  # time and later went green on a rerun). This sweep merges any green, non-major
  # Dependabot PR still open — matching the monochrome-edge daily-sweep.
  schedule:
    - cron: '30 0 * * *' # 09:30 KST, after Dependabot's 09:00 KST run
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  merge:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - name: Merge minor/patch Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for $BRANCH (already merged or closed) — nothing to do."
            exit 0
          fi

          AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')
          if [ "$AUTHOR" != "app/dependabot" ] && [ "$AUTHOR" != "dependabot[bot]" ]; then
            echo "PR #$PR_NUMBER author is $AUTHOR, not Dependabot — skipping."
            exit 0
          fi

          TEXT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,body --jq '.title + "\n" + .body')

          # Every "from X to Y" version pair (title + grouped-PR body) must stay
          # within the same major. Unparseable PRs are treated as major (no merge).
          PAIRS=$(echo "$TEXT" | grep -oiE 'from v?[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)? to v?[0-9]+(\.[0-9]+)*' || true)
          if [ -z "$PAIRS" ]; then
            echo "PR #$PR_NUMBER: could not parse version bumps — leaving for human review."
            exit 0
          fi

          MAJOR_BUMP=0
          while read -r _ FROM _ TO; do
            FROM_MAJOR=${FROM#v}; FROM_MAJOR=${FROM_MAJOR%%.*}
            TO_MAJOR=${TO#v}; TO_MAJOR=${TO_MAJOR%%.*}
            if [ "$FROM_MAJOR" != "$TO_MAJOR" ]; then
              echo "Major bump detected: $FROM -> $TO"
              MAJOR_BUMP=1
            fi
          done <<< "$PAIRS"

          if [ "$MAJOR_BUMP" = "1" ]; then
            echo "PR #$PR_NUMBER contains a major bump — leaving for human review."
            exit 0
          fi

          echo "Merging PR #$PR_NUMBER (minor/patch only, CI green)."
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch

          # GITHUB_TOKEN merges don't fire push-triggered workflows;
          # dispatch the deploy explicitly so the update actually ships.
          gh workflow run deploy.yml --repo "$REPO" --ref main

  # Scheduled/manual daily sweep: merge every green, non-major Dependabot PR
  # still open (checks passed, mergeStateStatus CLEAN). Complements the
  # workflow_run job above for PRs whose success event was missed.
  daily-sweep:
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    steps:
      - name: Sweep mergeable Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Open Dependabot PRs that are green + mergeable (CLEAN merge state).
          PRS=$(gh pr list --repo "$REPO" --author "app/dependabot" --state open \
            --json number,mergeStateStatus \
            --jq '.[] | select(.mergeStateStatus == "CLEAN") | .number')
          if [ -z "$PRS" ]; then
            echo "No green Dependabot PRs to sweep."
            exit 0
          fi
          MERGED=0
          for PR in $PRS; do
            TEXT=$(gh pr view "$PR" --repo "$REPO" --json title,body --jq '.title + "\n" + .body')
            # Same major-bump guard as the workflow_run job: skip cross-major and
            # anything whose version pair can't be parsed.
            PAIRS=$(echo "$TEXT" | grep -oiE 'from v?[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)? to v?[0-9]+(\.[0-9]+)*' || true)
            if [ -z "$PAIRS" ]; then
              echo "PR #$PR: unparseable version bump — leaving for review."
              continue
            fi
            MAJOR=0
            while read -r _ FROM _ TO; do
              FM=${FROM#v}; FM=${FM%%.*}; TM=${TO#v}; TM=${TM%%.*}
              [ "$FM" != "$TM" ] && MAJOR=1
            done <<< "$PAIRS"
            if [ "$MAJOR" = "1" ]; then
              echo "PR #$PR: major bump — leaving for review."
              continue
            fi
            echo "Sweeping PR #$PR (minor/patch, CLEAN)."
            gh pr merge "$PR" --repo "$REPO" --squash --delete-branch && MERGED=1
          done
          # Ship any merged updates (GITHUB_TOKEN merges don't fire push triggers).
          if [ "$MERGED" = "1" ]; then
            gh workflow run deploy.yml --repo "$REPO" --ref main || true
          fi
